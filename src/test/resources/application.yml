# Test-scoped overrides.
# Testcontainers provides the real Postgres datasource via @ServiceConnection.
# Flyway (V1–V4) owns all schema: pgvector extension, document_chunks, HNSW index.
# EmbeddingModel and ChatModel are @MockitoBean in integration tests — Ollama not required at test time.
# This file SHADOWS (does not merge with) src/main/resources/application.yml — duplicate every needed block.
spring:
  ai:
    ollama:
      base-url: http://localhost:11434
    vectorstore:
      pgvector:
        table-name: document_chunks
        initialize-schema: false
        schema-validation: false
        dimensions: 768
        distance-type: COSINE_DISTANCE

claimassist:
  retrieval:
    top-k: 5
    threshold: 0.0
  generation:
    timeout-seconds: 60
    system-prompt-location: classpath:prompts/system-prompt.st
