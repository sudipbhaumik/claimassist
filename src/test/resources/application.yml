# Test-scoped overrides.
# Testcontainers provides the real Postgres datasource via @ServiceConnection.
# Flyway (V1–V4) owns all schema: pgvector extension, document_chunks, HNSW index.
# PgVectorStore inherits initialize-schema: false from main application.yml — no schema conflicts.
# EmbeddingModel is @MockBean in integration tests — Ollama is not required at test time.
spring:
  ai:
    ollama:
      base-url: http://localhost:11434
    vectorstore:
      pgvector:
        table-name: document_chunks
        initialize-schema: false
        schema-validation: false
        dimensions: 768
        distance-type: COSINE_DISTANCE
